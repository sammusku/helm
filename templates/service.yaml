apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
spec:
  type: {{ .Values.service.type }}
  #clusterIP: None
  selector:
    # labels are used as selectors
    project: roboshop
    component: frontend
  ports:
  - protocol: TCP
    port: 80 # servie port
    targetPort: 80 # container port